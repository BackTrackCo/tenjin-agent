name: contract-drift

# The committed openapi fixture pins the contract per-PR (offline, inside CI's
# `pnpm check`). THIS workflow re-runs the same pins against the LIVE deployment
# so the server moving under a released CLI surfaces on its own, without gating
# unrelated PRs on tenjin.blog's availability (same pattern as skill-drift.yml).
# The dispatch input also runs the wallet-free live e2e legs (lookup/outcome
# loop, free-hit buy, paid 402 inspect); the paid, USDC-settling e2e leg is
# never run from CI and stays a local, deliberate act.
on:
  schedule:
    - cron: '23 9 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployment to walk (default prod)
        required: false
        default: https://tenjin.blog
      run_e2e:
        description: Also run the wallet-free live e2e legs
        type: boolean
        required: false
        default: false

permissions: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Contract pins vs live deploy
        run: pnpm vitest run src/contract.test.ts
        env:
          TENJIN_CONTRACT_BASE_URL: ${{ inputs.base_url || 'https://tenjin.blog' }}
      - name: Live e2e (wallet-free legs)
        if: ${{ inputs.run_e2e == true }}
        run: pnpm vitest run src/live-e2e.test.ts
        env:
          TENJIN_E2E_BASE_URL: ${{ inputs.base_url || 'https://tenjin.blog' }}
