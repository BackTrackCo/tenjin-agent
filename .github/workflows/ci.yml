name: CI

# PR-gated (required check on main) plus manual dispatch for ad-hoc runs.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on rapid pushes / PR updates.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny; the job opts into only what it needs.
permissions: {}

jobs:
  ci:
    name: CI (lint, typecheck, build, test, audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      # check = build + test.
      - run: pnpm run check
      # Blocking supply-chain gate (fails on high/critical). Runs after
      # build/test so an advisory/network flake can't mask their signal.
      - run: pnpm audit --audit-level=high
      # Packed-artifact smoke on the engines floor (Node 22). npm-packs the
      # CLI, installs the tarball into a throwaway consumer, and exercises the
      # PUBLISHED shape (--version, config, a bogus command) — catching
      # externalized chunks and missing `files` entries the source-tree tests
      # can't. Last so no earlier step runs on anything but Node 24.
      - name: Set up Node 22 (engines floor)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Packed-artifact smoke
        run: bash scripts/pack-smoke.sh
