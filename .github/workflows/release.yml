name: release

# Fires on the tag scripts/release.mjs creates (vX.Y.Z, pushed manually via
# `git push --follow-tags` per the printed instructions; nothing pushes a tag
# on its own). Re-runs the full check suite against the tagged commit rather
# than trusting whatever CI said on the PR, then publishes to npm.
on:
  push:
    tags:
      - 'v*'

# Default-deny; the job opts into only what it needs. id-token: write is for
# npm provenance (OIDC-signed attestation, no long-lived signing key).
permissions: {}

jobs:
  release:
    name: release (publish tenjin-cli)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # The tag is the only thing this workflow trusts to decide what gets
      # published; if it drifts from package.json (bad manual tag, tag pushed
      # off the wrong commit), fail loud instead of publishing the wrong version.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "PUBLISH_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm run check # build + test

      # Prerelease versions (anything with a `-`, e.g. 0.1.0-alpha.2) publish
      # under the `alpha` dist-tag so `npm install tenjin-cli` never resolves
      # one; stable versions get `latest`.
      - name: Determine npm dist-tag
        run: |
          if [[ "$PUBLISH_VERSION" == *-* ]]; then
            echo "NPM_TAG=alpha" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
