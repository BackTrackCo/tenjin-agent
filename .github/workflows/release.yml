name: release

# Fires on the tag scripts/release.mjs creates (vX.Y.Z, pushed manually via
# `git push --follow-tags` per the printed instructions; nothing pushes a tag
# on its own). Re-runs the full check suite against the tagged commit rather
# than trusting whatever CI said on the PR, then publishes to npm.
#
# Auth is npm OIDC trusted publishing (no long-lived NPM_TOKEN): the job's
# short-lived id-token is exchanged with the registry at publish time. Same
# shape as x402-foundation/x402's publish_npm_scoped_x402_* workflows. The
# owner must register this repo + workflow + `npm` environment as a Trusted
# Publisher on npmjs.com first (see README Release section).
on:
  push:
    tags:
      - 'v*'

# Default-deny; the job opts into only what it needs.
permissions: {}

jobs:
  release:
    name: release (publish tenjin-cli)
    # Don't run on forks that happen to carry a matching tag; the OIDC subject
    # is scoped to this repo, so a fork could never publish anyway, but fail
    # fast rather than burn a run and confuse the logs.
    if: github.repository == 'BackTrackCo/tenjin-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # GitHub Environment named in the npmjs.com Trusted Publisher config. Also
    # the hook for manual publish approval / branch protection if the owner
    # wants a human gate before a tag can publish.
    environment: npm
    permissions:
      contents: read
      # OIDC token minting for trusted publishing (and provenance). This is the
      # only write-ish grant; there is no registry secret in this workflow.
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # The tag is the only thing this workflow trusts to decide what gets
      # published; if it drifts from package.json (bad manual tag, tag pushed
      # off the wrong commit), fail loud instead of publishing the wrong version.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "PUBLISH_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      # Blocking supply-chain gate, same bar as ci.yml: an advisory disclosed
      # after the PR merged must stop the publish, not just the next PR.
      - run: pnpm audit --audit-level=high
      - run: pnpm run check # build + test

      # Same engines-floor smoke as ci.yml: the packed artifact must run on
      # Node 22 (the engines minimum), then publish switches back to 24.
      - name: Set up Node 22 (engines floor)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Packed-artifact smoke
        run: bash scripts/pack-smoke.sh
      - name: Restore Node 24 for publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1 (Node 24 ships an older 11.x).
      # Pinned to match the sibling x402 repo's publish jobs.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.14.1 --ignore-scripts
      # setup-node writes an .npmrc with an (empty) _authToken line; the OIDC
      # exchange supersedes it, but drop stale always-auth so npm doesn't try
      # token auth before falling through to trusted publishing.
      - name: Clear stale npm auth config
        run: npm config delete always-auth 2>/dev/null || true

      # Prerelease versions (anything with a `-`, e.g. 0.1.0-alpha.2) publish
      # under the `alpha` dist-tag so `npm install tenjin-cli` never resolves
      # one; stable versions get `latest`.
      - name: Determine npm dist-tag
        run: |
          if [[ "$PUBLISH_VERSION" == *-* ]]; then
            echo "NPM_TAG=alpha" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          fi

      # No NODE_AUTH_TOKEN: auth is the OIDC id-token exchanged with the
      # registry. --provenance is redundant under trusted publishing (npm
      # attests automatically) but kept explicit as intent.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --provenance --access public --tag "$NPM_TAG"
