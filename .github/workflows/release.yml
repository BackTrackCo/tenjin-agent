name: Release

# Changesets + npm Trusted Publishing (OIDC), workflow_dispatch only. Adapted
# from BackTrackCo/x402r-sdk's release.yml (the house template); the operator
# runbook is this repo's own RELEASING.md. Nothing auto-fires: a maintainer
# clicks Run workflow once to open the version PR, merges it, then clicks again
# to publish.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a mid-release run: a partial publish leaves npm inconsistent.
  # Queue subsequent dispatches instead.
  cancel-in-progress: false

jobs:
  # Job 1: open/update the "version packages" PR if changesets are pending.
  # Publishes nothing, so no OIDC scope and no environment gate.
  version:
    name: Version
    # workflow_dispatch lets the operator pick any ref; bind to main so a
    # dispatch off a stale branch can't spend the pull-requests token opening
    # version PRs against arbitrary refs.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    permissions:
      contents: write # push the version-bump commit
      pull-requests: write # open/update the version PR
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # PRs opened with the default GITHUB_TOKEN don't trigger downstream
      # workflows (Actions anti-recursion), so required CI would silently skip
      # the version PR. An App-token-opened PR triggers CI like a human's would.
      - name: Mint release-bot installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # changesets/action pushes the bump branch via git CLI, which reads
          # the persisted token from local git config; the env GITHUB_TOKEN
          # below only reaches octokit.
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0 # full history for changelog generation

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # No `cache: pnpm`: the privileged release runner must not deserialize the
      # cache that ci.yml writes from untrusted PR runs (cache-poisoning vector).
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create or update version PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm exec changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # Job 2: publish to npm. Runs only when the version job found NO pending
  # changesets (the version PR was already merged and package.json is bumped).
  publish:
    name: Publish to npm
    # Same main-bind as version: environment + workflow filename alone don't
    # restrict the ref, so a stale-branch dispatch must not mint a publishable
    # OIDC token.
    if: github.ref == 'refs/heads/main' && needs.version.outputs.hasChangesets == 'false'
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Environment named in the npm Trusted Publishing config for tenjin-cli.
    # Required-reviewer protection here is optional (workflow_dispatch already
    # gates on maintainer access); the label must stay regardless for OIDC scope.
    environment: npm-publish
    permissions:
      contents: write # git tag + GitHub release created by changesets/action
      id-token: write # OIDC handshake for npm Trusted Publishing
    env:
      # Belt-and-suspenders provenance; Trusted Publishing attests by default,
      # this guarantees it even if a publishConfig is ever dropped.
      NPM_CONFIG_PROVENANCE: 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # App token only so the GitHub release is attributed to the release bot,
      # not github-actions[bot]. npm publish itself uses OIDC, not this token.
      - name: Mint release-bot installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # changeset publish pushes the release tag via git CLI; needs the
          # persisted token for auth.
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # No `cache: pnpm` here either, same cache-poisoning reason as the version job.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs npm >= 11.5.1 (Node 24 ships an older 11.x).
      - name: Pin npm
        run: npm install --global npm@11.14.1 --ignore-scripts

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Build + validate BEFORE publishing so a broken build or failing test
      # can't ship. (The house template validates with publint + attw via
      # test:pkg; tenjin doesn't carry those yet, so we gate on the existing
      # check suite plus the packed-artifact smoke, which exercises the real
      # published tarball.)
      - name: Build + validate
        run: |
          pnpm run check
          pnpm audit --audit-level=high
          bash scripts/pack-smoke.sh

      - name: Publish to npm
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm exec changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
