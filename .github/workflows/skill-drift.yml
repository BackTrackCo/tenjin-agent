name: skill-drift

# The vendored skills/tenjin/SKILL.md is a byte-for-byte mirror of the canonical
# tenjin.blog/skills.md. Re-run the (dep-free) sync and fail if the committed copy
# has drifted: daily so an upstream edit surfaces on its own, and on any PR that
# touches the mirror or its generator so a hand-edit never slips through.
on:
  schedule:
    - cron: '27 6 * * *' # 06:27 UTC daily, off the top-of-hour congestion.
  workflow_dispatch:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/sync-skill.mjs'

concurrency:
  group: skill-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny; the job opts into only what it needs.
permissions: {}

jobs:
  skill-drift:
    name: skill-drift (mirror is in sync)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      # No install: the script uses only Node built-ins + global fetch.
      - run: node scripts/sync-skill.mjs
      # Any diff means the committed mirror is stale (or hand-edited). Fail loud;
      # the fix is `pnpm sync:skill` locally, then commit.
      - run: git diff --exit-code -- skills/
